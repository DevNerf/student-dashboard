<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${news != null ? 'Редактирование новости' : 'Создание новости'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; padding: 1.5rem; }
        .btn-gradient { border-radius: 50px; padding: 12px; font-weight: bold; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; }
        .form-control, .form-select { border-radius: 10px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/dashboard}"><i class="bi bi-shield-lock-fill"></i> Админ-панель</a>
        <a class="nav-link text-white" th:href="@{/admin/news}"><i class="bi bi-arrow-left"></i> Назад к новостям</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 th:text="${news != null ? '✏️ Редактирование новости' : '➕ Создание новости'}"></h4>
                </div>
                <div class="card-body">
                    <form th:action="${news != null ? '/admin/news/update/' + news.id : '/admin/news/save'}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Заголовок *</label>
                            <input type="text" name="title" class="form-control" required
                                   th:value="${news != null ? news.title : ''}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Содержание</label>
                            <textarea name="content" class="form-control" rows="8" th:text="${news != null ? news.content : ''}"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Категория</label>
                            <select name="category" class="form-select">
                                <option value="">Общая</option>
                                <option value="Важно" th:selected="${news != null && news.category == 'Важно'}">Важно</option>
                                <option value="Мероприятие" th:selected="${news != null && news.category == 'Мероприятие'}">Мероприятие</option>
                                <option value="Стипендия" th:selected="${news != null && news.category == 'Стипендия'}">Стипендия</option>
                                <option value="Экзамены" th:selected="${news != null && news.category == 'Экзамены'}">Экзамены</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-gradient w-100"><i class="bi bi-check-lg"></i> Сохранить</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
