<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление студентами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; }
        .btn-gradient { border-radius: 50px; padding: 10px 20px; font-weight: bold; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/dashboard}"><i class="bi bi-shield-lock-fill"></i> Админ-панель</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/admin/dashboard}">Главная</a>
            <a class="nav-link text-white" th:href="@{/admin/grades}">Оценки</a>
            <a class="nav-link text-white" href="#" data-bs-toggle="modal" data-bs-target="#logoutModal">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>👥 Студенты</h3>
        <a th:href="@{/admin/students/create}" class="btn btn-gradient"><i class="bi bi-person-plus"></i> Создать студента</a>
    </div>

    <div class="card">
        <div class="card-header"><h5>Список студентов</h5></div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr><th>ID</th><th>Имя</th><th>Фамилия</th><th>Email</th><th>Группа</th><th>Действия</th></tr>
                </thead>
                <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.first_name}"></td>
                    <td th:text="${s.last_name}"></td>
                    <td th:text="${s.email}"></td>
                    <td>
                        <span class="badge bg-primary" th:text="${s.group_name != null ? s.group_name : 'Без группы'}"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/students/edit/{id}(id=${s.id})}" class="btn btn-sm btn-primary"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/admin/students/delete/{id}(id=${s.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0;">
                <h5 class="modal-title"><i class="bi bi-box-arrow-right"></i> Подтверждение выхода</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="bi bi-person-circle" style="font-size: 4rem; color: #667eea;"></i>
                <h4 class="mt-3">Администратор</h4>
                <div class="alert alert-warning mt-3" style="border-radius: 15px;">
                    Вы действительно хотите выйти из админ-панели?
                </div>
            </div>
            <div class="modal-footer justify-content-center" style="border-top: none;">
                <form th:action="@{/perform-logout}" method="post">
                    <button type="submit" class="btn btn-yes" style="border-radius: 50px; padding: 10px 25px; font-weight: bold; background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); border: none; color: white;">
                        <i class="bi bi-check-lg"></i> Да, выйти
                    </button>
                </form>
                <button type="button" class="btn btn-no" data-bs-dismiss="modal" style="border-radius: 50px; padding: 10px 25px; font-weight: bold; border: 2px solid #667eea; color: #667eea; background: white;">
                    <i class="bi bi-x-lg"></i> Нет, остаться
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
