<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление учётными записями студентов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; }
        .btn-gradient { border-radius: 50px; padding: 10px 20px; font-weight: bold; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; }
        .pagination .page-link { color: #667eea; border-radius: 50px; margin: 0 3px; }
        .pagination .active .page-link { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-color: transparent; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/dashboard}"><i class="bi bi-shield-lock-fill"></i> Админ-панель</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/admin/dashboard}">Главная</a>
            <a class="nav-link text-white" th:href="@{/admin/grades}">Оценки</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>👥 Студенты</h3>
        <a th:href="@{/admin/students/create}" class="btn btn-gradient"><i class="bi bi-person-plus"></i> Создать учётную запись студента</a>
    </div>

    <div class="mb-3">
        <select id="groupFilter" class="form-select d-inline-block w-auto" onchange="location.href='?groupId=' + this.value + '&page=0'">
            <option value="">Все группы</option>
            <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.name}"></option>
        </select>
    </div>

    <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mb-3">
        <span class="text-muted">
            Страница <strong th:text="${currentPage + 1}"></strong> из <strong th:text="${totalPages}"></strong>
        </span>
        <nav>
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/students(page=${currentPage - 1}, groupId=${param.groupId})}">&laquo;</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link" th:href="@{/admin/students(page=${i}, groupId=${param.groupId})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/students(page=${currentPage + 1}, groupId=${param.groupId})}">&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>

    <div class="card">
        <div class="card-header"><h5>Список студентов</h5></div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr><th>ID</th><th>Фамилия</th><th>Имя</th><th>Отчество</th><th>Email</th><th>Группа</th><th>Действия</th></tr>
                </thead>
                <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.id}"></td>
                    <td th:text="${s.lastName}"></td>
                    <td th:text="${s.firstName}"></td>
                    <td th:text="${s.middleName ?: '—'}"></td>
                    <td th:text="${s.email}"></td>
                    <td>
                        <span class="badge bg-primary" th:text="${s.group?.name != null ? s.group.name : 'Без группы'}"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/students/edit/{id}(id=${s.id})}" class="btn btn-sm btn-primary"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/admin/students/delete/{id}(id=${s.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить?')"><i class="bi bi-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var urlParams = new URLSearchParams(window.location.search);
        var groupId = urlParams.get('groupId');
        if (groupId) {
            document.getElementById('groupFilter').value = groupId;
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
