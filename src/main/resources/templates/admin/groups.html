<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управление группами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; }
        .btn-gradient { border-radius: 50px; padding: 10px 20px; font-weight: bold; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/dashboard}"><i class="bi bi-shield-lock-fill"></i> Админ-панель</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/admin/dashboard}">Главная</a>
            <a class="nav-link text-white" th:href="@{/admin/students}">Студенты</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card mb-4">
        <div class="card-header"><h5>➕ Создать группу</h5></div>
        <div class="card-body">
            <form th:action="@{/admin/groups/save}" method="post" class="row g-2">
                <div class="col-md-9">
                    <input type="text" name="name" class="form-control" placeholder="Название группы" required>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-gradient w-100">Создать</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><h5>📚 Список групп</h5></div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead><tr><th>ID</th><th>Название</th><th>Действия</th></tr></thead>
                <tbody>
                <tr th:each="g : ${groups}">
                    <td th:text="${g.id}"></td>
                    <td th:text="${g.name}"></td>
                    <td>
                        <a th:href="@{/admin/students(groupId=${g.id})}" class="btn btn-sm btn-primary">Студенты</a>
                        <a th:href="@{/admin/groups/delete/{id}(id=${g.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить группу?')">Удалить</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
