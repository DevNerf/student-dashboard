<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Форма студента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; padding: 1.5rem; }
        .btn-gradient { border-radius: 50px; padding: 12px; font-weight: bold; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: white; }
        .form-control { border-radius: 10px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/admin/dashboard}"><i class="bi bi-shield-lock-fill"></i> Админ-панель</a>
        <a class="nav-link text-white" th:href="@{/admin/students}"><i class="bi bi-arrow-left"></i> Назад к студентам</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h4 th:text="${student != null ? '✏️ Редактирование студента' : '➕ Создание студента'}"></h4>
                </div>
                <div class="card-body">
                    <form th:action="${student != null ? '/admin/students/update/' + student.id : '/admin/students/save'}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Имя</label>
                            <input type="text" name="firstName" class="form-control" required
                                   th:value="${student != null ? student.first_name : ''}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Фамилия</label>
                            <input type="text" name="lastName" class="form-control" required
                                   th:value="${student != null ? student.last_name : ''}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" required
                                   th:value="${student != null ? student.email : ''}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="text" name="password" class="form-control"
                                   th:placeholder="${student != null ? 'Оставьте пустым, чтобы не менять' : 'Введите пароль'}"
                                   th:required="${student == null}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Место рождения</label>
                            <input type="text" name="birthPlace" class="form-control"
                                   th:value="${student != null ? student.birth_place : ''}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Группа</label>
                            <select name="groupId" class="form-select">
                                <option value="">Без группы</option>
                                <option th:each="g : ${groups}" th:value="${g.id}"
                                        th:text="${g.name}"
                                        th:selected="${student != null && student.group_id == g.id}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Факультет</label>
                            <input type="text" name="faculty" class="form-control"
                                   th:value="${student != null ? student.faculty : ''}">
                        </div>
                        <button type="submit" class="btn btn-gradient w-100">
                            <i class="bi bi-check-lg"></i> Сохранить
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
