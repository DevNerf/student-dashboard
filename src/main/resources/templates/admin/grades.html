<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Выставление оценок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); min-height: 100vh; color: white; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; color: #333; }
        .card-header { background: linear-gradient(135deg, #c62828 0%, #b71c1c 100%); color: white; border-radius: 20px 20px 0 0; }
        .btn-gradient { border-radius: 50px; padding: 10px 25px; font-weight: bold; border: none; color: white; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .form-select { border-radius: 10px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background: rgba(255,255,255,0.1);">
    <div class="container">
        <a class="navbar-brand text-white" th:href="@{/admin/dashboard}">🔧 Админ-панель</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/admin/students}">Студенты</a>
            <a class="nav-link text-white" th:href="@{/admin/dashboard}">Главная</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-3">📊 Выставление оценок</h2>

    <div th:if="${param.success}" class="alert alert-success">✅ Оценки сохранены!</div>
    <div th:if="${param.error}" class="alert alert-danger">❌ Выберите группу и предмет</div>

    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/admin/grades}" method="get" class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Группа</label>
                    <select name="groupId" class="form-select" required>
                        <option value="">Выберите группу</option>
                        <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.name}"></option>
                    </select>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Предмет</label>
                    <select name="subjectId" class="form-select" required>
                        <option value="">Выберите предмет</option>
                        <option th:each="s : ${subjects}" th:value="${s.id}"
                                th:text="${s.name} + ' (' + ${s.examType} + ')'"></option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-gradient w-100">Показать</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card" th:if="${students != null and selectedSubjectId != null}">
        <div class="card-header">
            <h5>Выставление оценок</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/admin/grades/save}" method="post">
                <input type="hidden" name="subjectId" th:value="${selectedSubjectId}">
                <input type="hidden" name="groupId" th:value="${selectedGroupId}">
                <table class="table">
                    <thead>
                    <tr><th>Студент</th><th>Оценка (2-5)</th></tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.lastName} + ' ' + ${s.firstName}"></td>
                        <td>
                            <input type="number" th:name="'grade_' + ${s.id}"
                                   min="2" max="5" class="form-control" style="width:100px"
                                   th:value="${gradeMap != null ? gradeMap[s.id] : ''}">
                        </td>
                    </tr>
                    </tbody>
                </table>
                <button type="submit" class="btn btn-gradient"><i class="bi bi-save"></i> Сохранить оценки</button>
            </form>
        </div>
    </div>

    <div class="alert alert-info mt-3" th:unless="${students != null}">
        Выберите группу и предмет, затем нажмите «Показать»
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
