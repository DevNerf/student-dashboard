<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация студента</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4">Регистрация студента</h2>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/register}" th:object="${student}" method="post">
                <div class="mb-3">
                    <label for="firstName" class="form-label">Имя</label>
                    <input type="text" class="form-control" id="firstName"
                           th:field="*{firstName}" required>
                </div>

                <div class="mb-3">
                    <label for="lastName" class="form-label">Фамилия</label>
                    <input type="text" class="form-control" id="lastName"
                           th:field="*{lastName}" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email"
                           th:field="*{email}" required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password"
                           th:field="*{password}" required>
                </div>

                <div class="mb-3">
                    <label for="groupName" class="form-label">Группа</label>
                    <input type="text" class="form-control" id="groupName"
                           th:field="*{groupName}">
                </div>

                <div class="mb-3">
                    <label for="faculty" class="form-label">Факультет</label>
                    <input type="text" class="form-control" id="faculty"
                           th:field="*{faculty}">
                </div>

                <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
            </form>

            <div class="mt-3 text-center">
                <a th:href="@{/login}">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
