<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход в личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 2rem;
            text-align: center;
        }

        .login-body {
            background: #f8f9fa;
            border-radius: 0 0 20px 20px;
            padding: 2rem;
        }

        .btn-login {
            border-radius: 50px;
            padding: 12px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card login-card">
                <div class="login-header">
                    <h2>🎓 Личный кабинет</h2>
                    <p class="text-muted">Войдите в систему</p>
                </div>

                <div class="login-body">
                    <div th:if="${param.logout}" class="alert alert-success">
                        <i class="bi bi-check-circle"></i>
                        Вы успешно вышли из системы. Сессия завершена.
                    </div>

                    <div th:if="${param.expired}" class="alert alert-warning">
                        <i class="bi bi-clock-history"></i>
                        Сессия истекла. Пожалуйста, войдите снова.
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-circle"></i>
                        Неверный email или пароль.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-login w-100">Войти</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a th:href="@{/register}" class="text-decoration-none">📝 Регистрация</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
