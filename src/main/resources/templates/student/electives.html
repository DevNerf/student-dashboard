<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои курсы по выбору</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/student/dashboard}"><i class="bi bi-mortarboard-fill"></i> Личный кабинет</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/student/dashboard}">Главная</a>
            <a class="nav-link" th:href="@{/logout-confirm}">Выйти</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h3>📚 Мои курсы по выбору</h3>

    <div class="mb-3">
        <label class="fw-bold">Семестр:</label>
        <select class="form-select d-inline-block w-auto" onchange="location.href='?semester=' + this.value">
            <option value="1" th:selected="${selectedSemester == 1}">1 семестр</option>
            <option value="2" th:selected="${selectedSemester == 2}">2 семестр</option>
            <option value="3" th:selected="${selectedSemester == 3}">3 семестр</option>
            <option value="4" th:selected="${selectedSemester == 4}">4 семестр</option>
        </select>
    </div>

    <div class="row" th:if="${electives != null and !electives.isEmpty()}">
        <div class="col-md-6 mb-3" th:each="e : ${electives}">
            <div class="card">
                <div class="card-header" th:text="${e.subject.name}"></div>
                <div class="card-body">
                    <p><strong>Преподаватель:</strong> <span th:text="${e.subject.teacher ?: '—'}"></span></p>
                    <p><strong>Тип:</strong> <span class="badge bg-primary" th:text="${e.subject.examType}"></span></p>
                </div>
            </div>
        </div>
    </div>

    <div th:unless="${electives != null and !electives.isEmpty()}" class="alert alert-info">
        У вас пока нет курсов по выбору в этом семестре.
    </div>

    <a th:href="@{/student/dashboard}" class="btn btn-primary mt-3">← На главную</a>
</div>
</body>
</html>
