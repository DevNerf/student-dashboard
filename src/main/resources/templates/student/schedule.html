<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Предметы сессии</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: #f5f5f5; font-family: 'Segoe UI', sans-serif; }
        .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; }
        .subject-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: default;
        }
        .subject-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .badge-exam { background: #dc3545; }
        .badge-zachet { background: #28a745; }
        .badge-course { background: #ffc107; color: #333; }
        .modal-content { border-radius: 20px; border: none; }
        .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; }
        .modal-footer { border-top: none; }
        .btn-yes { border-radius: 50px; padding: 10px 25px; font-weight: bold; background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); border: none; color: white; }
        .btn-yes:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(220, 53, 69, 0.4); color: white; }
        .btn-no { border-radius: 50px; padding: 10px 25px; font-weight: bold; border: 2px solid #667eea; color: #667eea; background: white; }
        .btn-no:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/student/dashboard}">
            <i class="bi bi-mortarboard-fill"></i> Личный кабинет
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/student/dashboard}">
                <i class="bi bi-house-door"></i> Главная
            </a>
            <a class="nav-link" th:href="@{/student/profile}">
                <i class="bi bi-person"></i> Профиль
            </a>
            <a class="nav-link" th:href="@{/student/gradebook}">
                <i class="bi bi-book"></i> Оценки
            </a>
            <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#logoutModal">
                <i class="bi bi-box-arrow-right"></i> Выйти
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-3"><i class="bi bi-journal-text"></i> Предметы сессии</h2>

    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">
                Студент: <span th:text="${student.lastName + ' ' + student.firstName}"></span> |
                Группа: <span th:text="${student.group?.name ?: 'Не указана'}"></span>
            </h5>
        </div>
    </div>

    <div class="row" th:if="${subjects != null and !subjects.isEmpty()}">
        <div class="col-md-6 mb-4" th:each="s : ${subjects}">
            <div class="card subject-card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${s.name}"></h5>
                    <hr>
                    <p class="mb-2">
                        <i class="bi bi-person-badge"></i>
                        <strong>Преподаватель:</strong>
                        <span th:text="${s.teacher != null ? s.teacher : 'Не назначен'}"></span>
                    </p>
                    <p class="mb-2">
                        <i class="bi bi-calendar3"></i>
                        <strong>Семестр:</strong>
                        <span th:text="${s.semester != null ? s.semester : '—'}"></span>
                    </p>
                    <p class="mb-0">
                        <strong>Тип контроля:</strong>
                        <span class="badge"
                              th:classappend="${s.examType == 'Экзамен'} ? 'badge-exam' :
                         (${s.examType == 'Зачёт'} ? 'badge-zachet' : 'badge-course')"
                              th:text="${s.examType != null ? s.examType : '—'}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="alert alert-info" th:unless="${subjects != null and !subjects.isEmpty()}">
        <i class="bi bi-info-circle"></i> Предметы пока не добавлены. Обратитесь к администратору.
    </div>

    <div class="text-center mt-3">
        <a th:href="@{/student/dashboard}" class="btn btn-primary">
            <i class="bi bi-arrow-left"></i> Вернуться в главное меню
        </a>
    </div>
</div>

<div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="logoutModalLabel">
                    <i class="bi bi-box-arrow-right"></i> Подтверждение выхода
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Закрыть"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="bi bi-person-circle" style="font-size: 4rem; color: #667eea;"></i>
                <h4 class="mt-3" th:text="${student.lastName + ' ' + student.firstName}"></h4>
                <p class="text-muted" th:text="${student.email}"></p>
                <div class="alert alert-warning mt-3" style="border-radius: 15px;">
                    <i class="bi bi-exclamation-triangle"></i>
                    Вы действительно хотите выйти из личного кабинета?
                </div>
            </div>
            <div class="modal-footer justify-content-center">
                <form th:action="@{/perform-logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-yes">
                        <i class="bi bi-check-lg"></i> Да, выйти
                    </button>
                </form>
                <button type="button" class="btn btn-no" data-bs-dismiss="modal">
                    <i class="bi bi-x-lg"></i> Нет, остаться
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
