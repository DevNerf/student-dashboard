<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .card { border-radius: 20px; color: #333; }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; }
        .btn-gradient {
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        .btn-gradient:hover { opacity: 0.9; color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: rgba(255,255,255,0.1);">
    <div class="container">
        <a class="navbar-brand" th:href="@{/student/dashboard}">🎓 Личный кабинет</a>
        <a class="nav-link text-white" th:href="@{/logout-confirm}">Выйти</a>
    </div>
</nav>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><h4>👤 Профиль</h4></div>
                <div class="card-body">
                    <table class="table">
                        <tr><th>Имя:</th><td th:text="${student.firstName}"></td></tr>
                        <tr><th>Фамилия:</th><td th:text="${student.lastName}"></td></tr>
                        <tr><th>Email:</th><td th:text="${student.email}"></td></tr>
                        <tr><th>Группа:</th><td th:text="${student.group?.name ?: 'Не указана'}"></td></tr>
                    </table>
                    <hr>
                    <h5>Сменить пароль</h5>
                    <form th:action="@{/student/profile/change-password}" method="post">
                        <input type="password" name="newPassword" class="form-control mb-2" placeholder="Новый пароль" required>
                        <button type="submit" class="btn btn-gradient w-100">Сменить пароль</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
