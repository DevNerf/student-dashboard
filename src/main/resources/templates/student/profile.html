<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .card {
            border-radius: 20px;
            color: #333;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0;
        }
        .btn-gradient {
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
        }
        .btn-gradient:hover { opacity: 0.9; color: white; }
        .modal-content { border-radius: 20px; border: none; }
        .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 20px 20px 0 0; }
        .modal-footer { border-top: none; }
        .btn-yes {
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: bold;
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            border: none;
            color: white;
        }
        .btn-yes:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(220, 53, 69, 0.4); color: white; }
        .btn-no {
            border-radius: 50px;
            padding: 10px 25px;
            font-weight: bold;
            border: 2px solid #667eea;
            color: #667eea;
            background: white;
        }
        .btn-no:hover { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: rgba(255,255,255,0.1);">
    <div class="container">
        <a class="navbar-brand" th:href="@{/student/dashboard}">🎓 Личный кабинет</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" th:href="@{/student/dashboard}">
                <i class="bi bi-house-door"></i> На главную
            </a>
            <a class="nav-link text-white" href="#" data-bs-toggle="modal" data-bs-target="#logoutModal">
                <i class="bi bi-box-arrow-right"></i> Выйти
            </a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header"><h4>Профиль</h4></div>
                <div class="card-body">
                    <table class="table">
                        <tr><th>Фамилия:</th><td th:text="${student.lastName}"></td></tr>
                        <tr><th>Имя:</th><td th:text="${student.firstName}"></td></tr>
                        <tr><th>Отчество:</th><td th:text="${student.middleName}"></td></tr>
                        <tr><th>Email:</th><td th:text="${student.email}"></td></tr>
                        <tr><th>Место рождения:</th><td th:text="${student.birthPlace ?: 'Не указано'}"></td></tr>
                        <tr><th>Группа:</th><td th:text="${student.group?.name ?: 'Не указана'}"></td></tr>
                        <tr><th>Факультет:</th><td th:text="${student.faculty ?: 'Не указан'}"></td></tr>
                    </table>
                    <hr>
                    <h5>Сменить пароль</h5>
                    <form th:action="@{/student/profile/change-password}" method="post">
                        <input type="password" name="newPassword" class="form-control mb-2" placeholder="Новый пароль" required>
                        <button type="submit" class="btn btn-gradient w-100">Сменить пароль</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="logoutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-box-arrow-right"></i> Подтверждение выхода</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center py-4">
                <i class="bi bi-person-circle" style="font-size: 4rem; color: #667eea;"></i>
                <h4 class="mt-3" th:text="${student.firstName + ' ' + student.lastName}"></h4>
                <div class="alert alert-warning mt-3" style="border-radius: 15px;">
                    Вы действительно хотите выйти из личного кабинета?
                </div>
            </div>
            <div class="modal-footer justify-content-center">
                <form th:action="@{/perform-logout}" method="post">
                    <button type="submit" class="btn btn-yes"><i class="bi bi-check-lg"></i> Да, выйти</button>
                </form>
                <button type="button" class="btn btn-no" data-bs-dismiss="modal"><i class="bi bi-x-lg"></i> Нет, остаться</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
