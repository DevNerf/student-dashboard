<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация администратора</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .register-card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .register-header {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 2rem;
            text-align: center;
        }
        .register-body {
            background: #f8f9fa;
            border-radius: 0 0 20px 20px;
            padding: 2rem;
        }
        .btn-register {
            border-radius: 50px;
            padding: 12px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card register-card">
                <div class="register-header">
                    <h2>🔧 Регистрация администратора</h2>
                    <p class="text-muted">Доступ только по секретному ключу</p>
                </div>
                <div class="register-body">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/admin-register}" th:object="${student}" method="post" autocomplete="off">
                        <div class="mb-3">
                            <label class="form-label">Фамилия</label>
                            <input type="text" class="form-control" th:field="*{lastName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Имя</label>
                            <input type="text" class="form-control" th:field="*{firstName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Отчество</label>
                            <input type="text" class="form-control" th:field="*{middleName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" required autocomplete="off">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль (минимум 8 символов)</label>
                            <input type="password" class="form-control" th:field="*{password}" required minlength="8" autocomplete="new-password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Секретный ключ</label>
                            <input type="password" name="secretKey" class="form-control" required autocomplete="off">
                        </div>
                        <button type="submit" class="btn btn-register w-100">Зарегистрироваться как админ</button>
                    </form>

                    <div class="mt-3 text-center">
                        <a th:href="@{/login}" class="text-decoration-none">← Вернуться к входу</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
