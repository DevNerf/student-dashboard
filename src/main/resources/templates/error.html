<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ошибка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .error-card {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            color: #333;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        .error-icon {
            font-size: 5rem;
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-icon">⚠️</div>
    <h2 class="mt-3">Произошла ошибка</h2>
    <p th:text="${errorMessage ?: 'Что-то пошло не так. Попробуйте позже.'}"></p>
    <p class="text-muted small" th:if="${timestamp != null}">
        Время: <span th:text="${timestamp}"></span>
    </p>
    <a th:href="@{/login}" class="btn btn-primary mt-3">Вернуться на главную</a>
</div>
</body>
</html>
